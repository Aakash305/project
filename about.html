<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee House</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #6f4e37;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #4b2e2e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        .hero {
            text-align: center;
            padding: 50px;
            background: #d9b38c;
        }

        .menu {
            padding: 30px;
        }

        .menu h2 {
            text-align: center;
        }

        .menu-items {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px gray;
            text-align: center;
        }

        footer {
            background: #6f4e37;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h2>Welcome to Our Coffee Shop</h2>
        <p>Enjoy the best coffee in town!</p>
    </section>

    <footer>
        <p>Welcome all</p>
    </footer>

</body>
</html>
